<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Basic Webpage</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-200 via-sky-50 to-emerald-50 p-6 text-slate-800 grid place-items-center">
  <main class="w-full max-w-2xl rounded-2xl bg-white p-8 shadow-xl shadow-slate-900/10">
    <h1 class="mb-3 text-3xl font-bold leading-tight sm:text-4xl">Hello from your basic webpage</h1>
    <p class="mb-5 text-base leading-7 text-slate-600">This is a simple starter page with HTML, Tailwind CSS, and a tiny bit of JavaScript.</p>

    <button id="helloButton" type="button" class="rounded-xl bg-teal-700 px-4 py-2.5 text-base font-medium text-white transition hover:bg-teal-800 focus:outline-none focus:ring-2 focus:ring-teal-600 focus:ring-offset-2">Click me</button>
    <p id="message" class="mt-4 font-semibold text-teal-800"></p>
  </main>

  <script>
    const button = document.getElementById("helloButton");
    const message = document.getElementById("message");

    button.addEventListener("click", () => {
      message.textContent = "Nice! Your webpage is interactive.";
    });
  </script>
</body>
</html>
