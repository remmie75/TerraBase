<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Basic Webpage</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --accent: #0f766e;
      --accent-hover: #115e59;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(160deg, #e7eef8 0%, #f5faf7 100%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(700px, 100%);
      background: var(--card);
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: clamp(1.6rem, 3vw, 2.2rem);
    }

    p {
      margin: 0 0 16px;
      line-height: 1.6;
    }

    button {
      border: 0;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      padding: 10px 16px;
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    button:hover {
      background: var(--accent-hover);
    }

    #message {
      margin-top: 14px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main>
    <h1>Hello from your basic webpage</h1>
    <p>This is a simple starter page with HTML, CSS, and a tiny bit of JavaScript.</p>

    <button id="helloButton" type="button">Click me</button>
    <p id="message"></p>
  </main>

  <script>
    const button = document.getElementById("helloButton");
    const message = document.getElementById("message");

    button.addEventListener("click", () => {
      message.textContent = "Nice! Your webpage is interactive.";
    });
  </script>
</body>
</html>
