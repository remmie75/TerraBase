<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global News Topic Dashboard</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <main class="dashboard">
        <h1 id="dashboard-title">Global Topic Dashboard</h1>
        <p id="dashboard-subtitle" class="subtitle">Live headlines and images for your selected topic</p>

        <section class="topic-selector" aria-label="Topic selector">
            <label for="topic-select">Choose topic</label>
            <select id="topic-select" name="topic">
                <option value="middle-east">Middle East</option>
                <option value="energy">Energy Markets</option>
                <option value="technology">Technology</option>
                <option value="global-economy">Global Economy</option>
                <option value="climate">Climate</option>
            </select>
        </section>

        <section id="headline-section" class="headline-ticker" aria-label="Topic headlines">
            <p id="ticker-label" class="ticker-label">Topic Headlines</p>
            <div class="ticker-window">
                <div id="ticker-track" class="ticker-track">
                    <span>Loading latest headlines...</span>
                </div>
            </div>
        </section>

        <section id="news-grid" class="news-grid" aria-label="Topic news images">
            <article class="news-card">
                <a id="news-link-1" href="#" target="_blank" rel="noopener noreferrer">
                    <img id="news-image-1" src="https://via.placeholder.com/600x600/111111/ff5555?text=Loading" alt="Topic news image">
                    <p id="news-title-1" class="news-title">Loading headline...</p>
                </a>
            </article>
            <article class="news-card">
                <a id="news-link-2" href="#" target="_blank" rel="noopener noreferrer">
                    <img id="news-image-2" src="https://via.placeholder.com/600x600/111111/ff5555?text=Loading" alt="Topic news image">
                    <p id="news-title-2" class="news-title">Loading headline...</p>
                </a>
            </article>
            <article class="news-card">
                <a id="news-link-3" href="#" target="_blank" rel="noopener noreferrer">
                    <img id="news-image-3" src="https://via.placeholder.com/600x600/111111/ff5555?text=Loading" alt="Topic news image">
                    <p id="news-title-3" class="news-title">Loading headline...</p>
                </a>
            </article>
        </section>

        <section class="clock-grid" aria-label="World clocks">
            <article class="clock-card">
                <h2>US (Washington)</h2>
                <p id="clock-us" class="clock-time">--:--:--</p>
                <p id="date-us" class="clock-date">Loading...</p>
            </article>

            <article class="clock-card">
                <h2>Iran (Tehran)</h2>
                <p id="clock-iran" class="clock-time">--:--:--</p>
                <p id="date-iran" class="clock-date">Loading...</p>
            </article>

            <article class="clock-card">
                <h2>EU (Amsterdam)</h2>
                <p id="clock-amsterdam" class="clock-time">--:--:--</p>
                <p id="date-amsterdam" class="clock-date">Loading...</p>
            </article>
        </section>
    </main>
    <script src="scripts/app.js"></script>
</body>
</html>
