<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WW3 Middle East Dashboard</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <main class="dashboard">
        <h1>WW3 Middle East Dashboard</h1>
        <p class="subtitle">latest news on the conflict</p>

        <section class="headline-ticker" aria-label="Middle East conflict headlines">
            <p class="ticker-label">Middle East Conflict Headlines</p>
            <div class="ticker-window">
                <div id="ticker-track" class="ticker-track">
                    <span>Loading latest headlines...</span>
                </div>
            </div>
        </section>

        <section class="news-grid" aria-label="Conflict news images">
            <article class="news-card">
                <a id="news-link-1" href="#" target="_blank" rel="noopener noreferrer">
                    <img id="news-image-1" src="https://via.placeholder.com/600x600/111111/ff5555?text=Loading" alt="Conflict news image">
                    <p id="news-title-1" class="news-title">Loading headline...</p>
                </a>
            </article>
            <article class="news-card">
                <a id="news-link-2" href="#" target="_blank" rel="noopener noreferrer">
                    <img id="news-image-2" src="https://via.placeholder.com/600x600/111111/ff5555?text=Loading" alt="Conflict news image">
                    <p id="news-title-2" class="news-title">Loading headline...</p>
                </a>
            </article>
            <article class="news-card">
                <a id="news-link-3" href="#" target="_blank" rel="noopener noreferrer">
                    <img id="news-image-3" src="https://via.placeholder.com/600x600/111111/ff5555?text=Loading" alt="Conflict news image">
                    <p id="news-title-3" class="news-title">Loading headline...</p>
                </a>
            </article>
        </section>

        <section class="clock-grid" aria-label="World clocks">
            <article class="clock-card">
                <h2>US (Washington)</h2>
                <p id="clock-us" class="clock-time">--:--:--</p>
                <p id="date-us" class="clock-date">Loading...</p>
            </article>

            <article class="clock-card">
                <h2>Iran (Tehran)</h2>
                <p id="clock-iran" class="clock-time">--:--:--</p>
                <p id="date-iran" class="clock-date">Loading...</p>
            </article>

            <article class="clock-card">
                <h2>EU (Amsterdam)</h2>
                <p id="clock-amsterdam" class="clock-time">--:--:--</p>
                <p id="date-amsterdam" class="clock-date">Loading...</p>
            </article>
        </section>
    </main>
    <script src="scripts/app.js"></script>
</body>
</html>
